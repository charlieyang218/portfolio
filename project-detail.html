<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail | Jade Joplin</title>
    <style>
        :root { --bg: #fff; --text: #000; --gray: #f4f4f4; --trans: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); }
        .reveal { opacity: 0; transform: translateY(30px); transition: var(--trans); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 右侧悬浮导航栏设计 */
        .side-nav {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 2000;
        }
        .nav-line {
            width: 1px;
            height: 60px;
            background: #eee;
            margin: 15px 10px;
            transition: 0.3s;
        }
        .side-nav a {
            text-decoration: none;
            color: #ccc;
            font-size: 10px;
            letter-spacing: 2px;
            margin: 8px 0;
            transition: 0.3s;
            text-transform: uppercase;
            position: relative;
            padding-right: 20px;
        }
        .side-nav a::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 5px;
            height: 5px;
            background: #eee;
            border-radius: 50%;
            transform: translateY(-50%);
            transition: 0.3s;
        }
        .side-nav a:hover { color: #000; }
        .side-nav a:hover::after { background: #000; transform: translateY(-50%) scale(1.5); }
        
        header { position: absolute; width: 100%; height: 90px; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; }
        .logo { font-size: 22px; font-weight: 800; text-decoration: none; color: #000; letter-spacing: 2px; }
        
        .detail-hero { padding: 180px 50px 80px; text-align: center; }
        .detail-hero h1 { font-size: clamp(40px, 8vw, 100px); font-weight: 400; margin-bottom: 20px; }
        
        .info-bar { max-width: 1000px; margin: 0 auto 80px; display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #eee; padding-top: 30px; text-align: center; }
        .info-bar div label { display: block; font-size: 10px; color: #999; letter-spacing: 2px; margin-bottom: 5px; }
        
        .content { max-width: 1100px; margin: 0 auto; padding: 0 50px; }
        .big-img { width: 100%; height: 70vh; background: #eee; margin-bottom: 40px; }
        .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 100px; }
        .img-grid div { height: 500px; background: #f9f9f9; }

        footer { padding: 80px 50px; text-align: center; font-size: 11px; color: #ccc; letter-spacing: 1px; }

        @media (max-width: 768px) { .side-nav { display: none; } .info-bar { grid-template-columns: 1fr; gap: 20px; } }
    </style>
</head>
<body>
    <!-- 右侧导航 -->
    <div class="side-nav">
        <a href="index.html">Home</a>
        <div class="nav-line"></div>
        <a href="p1.html">Project 01</a>
        <a href="p2.html">Project 02</a>
        <a href="p3.html">Project 03</a>
        <a href="p4.html">Project 04</a>
        <a href="p5.html">Project 05</a>
    </div>

    <header><a href="index.html" class="logo">JADE JOPLIN</a></header>

    <main>
        <section class="detail-hero reveal">
            <h1>Project Title</h1> <!-- 你可以在这里修改每个页面的标题 -->
            <p style="letter-spacing: 4px; color: #888; font-size: 14px;">CASE STUDY / 2023</p>
        </section>

        <div class="info-bar reveal">
            <div><label>CLIENT</label><span>Art Gallery</span></div>
            <div><label>CATEGORY</label><span>Digital Branding</span></div>
            <div><label>ROLE</label><span>Creative Lead</span></div>
        </div>

        <div class="content">
            <div class="big-img reveal"></div>
            <div class="img-grid">
                <div class="reveal" style="background: #f2f2f2;"></div>
                <div class="reveal" style="background: #e9e9e9;"></div>
            </div>
            <div class="big-img reveal" style="background: #fafafa; height: 50vh;"></div>
        </div>
    </main>

    <footer>&copy; 2023 JADE JOPLIN. REPLICA</footer>

    <script>
        const obs = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('active')), {threshold:0.1});
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    </script>
</body>
</html>
