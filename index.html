<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jade Joplin | Portfolio</title>
    <style>
        :root { --bg: #fff; --text: #000; --gray: #e3e3e3; --trans: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }
        .reveal { opacity: 0; transform: translateY(30px); transition: var(--trans); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        header { position: fixed; top: 0; width: 100%; height: 90px; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background: rgba(255,255,255,0.9); z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; text-decoration: none; color: #000; }
        nav a { text-decoration: none; color: #000; font-size: 13px; margin-left: 30px; letter-spacing: 1px; text-transform: uppercase; }

        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-size: clamp(50px, 10vw, 120px); font-weight: 400; letter-spacing: -2px; }
        .hero p { font-size: 18px; letter-spacing: 6px; text-transform: uppercase; color: #666; }

        .work-grid { max-width: 1300px; margin: 0 auto; padding: 0 50px 100px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 100px 40px; }
        .work-link { text-decoration: none; color: inherit; display: block; }
        .img-wrap { width: 100%; height: 100%; overflow: hidden; background: var(--gray); }
        .img-box { width: 100%; height: 100%; transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .work-link:hover .img-box { transform: scale(1.05); }
        .work-item p { margin-top: 15px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

        /* 5个项目的非对称布局 */
        .item-1 { grid-column: 1 / 10; height: 650px; }
        .item-2 { grid-column: 2 / 7; height: 450px; }
        .item-3 { grid-column: 8 / 13; height: 400px; margin-top: -100px; }
        .item-4 { grid-column: 1 / 11; height: 600px; }
        .item-5 { grid-column: 4 / 10; height: 500px; }

        #contact { padding: 150px 50px; text-align: center; background: #f9f9f9; }
        #contact h2 { font-size: 40px; font-weight: 300; margin-bottom: 20px; }
        .email-link { font-size: 20px; color: #000; text-decoration: none; border-bottom: 1px solid #000; }

        footer { padding: 80px 50px; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">JADE JOPLIN</a>
        <nav>
            <a href="#work">WORK</a>
            <a href="#contact">CONTACT</a>
        </nav>
    </header>
    <main>
        <section class="hero reveal">
            <h1>JADE JOPLIN</h1>
            <p>Graphic Designer</p>
        </section>

        <div class="work-grid" id="work">
            <!-- 关键修改点：href 分别指向 p1 到 p5 -->
            <a href="p1.html" class="work-link item-1 reveal"><div class="work-item"><div class="img-wrap"><div class="img-box" style="background:#eee"></div></div><p>01 / Editorial</p></div></a>
            <a href="p2.html" class="work-link item-2 reveal"><div class="work-item"><div class="img-wrap"><div class="img-box" style="background:#ddd"></div></div><p>02 / Branding</p></div></a>
            <a href="p3.html" class="work-link item-3 reveal"><div class="work-item"><div class="img-wrap"><div class="img-box" style="background:#ccc"></div></div><p>03 / Digital</p></div></a>
            <a href="p4.html" class="work-link item-4 reveal"><div class="work-item"><div class="img-wrap"><div class="img-box" style="background:#bbb"></div></div><p>04 / Strategy</p></div></a>
            <a href="p5.html" class="work-link item-5 reveal"><div class="work-item"><div class="img-wrap"><div class="img-box" style="background:#aaa"></div></div><p>05 / Vision</p></div></a>
        </div>

        <section id="contact" class="reveal">
            <h2>Let's work together.</h2>
            <a href="mailto:hello@jadejoplin.com" class="email-link">hello@jadejoplin.com</a>
        </section>
    </main>
    <footer>&copy; 2023 JADE JOPLIN. CLONE PROJECT</footer>
    <script>
        const obs = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('active')), {threshold:0.1});
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    </script>
</body>
</html>
